<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Threads | Exclusive Collection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo">Premium<span>Threads</span></div>
            <nav>
                <ul class="nav-links">
                    <li><a href="#" class="nav-filter active" data-filter="all">Home</a></li>
                    <li><a href="#" class="nav-filter" data-filter="shirt">Shirts</a></li>
                    <li><a href="#" class="nav-filter" data-filter="pant">Pants</a></li>
                </ul>
            </nav>
            <div class="nav-icons">
                <input type="text" id="search-input" placeholder="Search products...">
                <a href="#" id="open-cart-btn"><i class="fas fa-shopping-cart"></i><span id="cart-count">0</span></a>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Upgrade Your Wardrobe</h1>
            <p>Premium quality Shirts and Tailored Pants for your style.</p>
        </div>
    </section>

    <section id="products">
        <h2 class="section-title">Our Collection</h2>
        <div id="products-grid">
            </div>
    </section>

    <div id="cart-sidebar" class="cart-sidebar">
        <button id="close-cart-btn">&times;</button>
        <h2>Your Shopping Bag</h2>
        <div id="cart-items"></div>
        <div class="cart-total">Total: <span id="total-price">Rs. 0</span></div>
        <button id="whatsapp-checkout">Order via WhatsApp</button>
    </div>

    <section id="about">
        <div class="about-content">
            <h2>About Us</h2>
            <p>Premium Threads brings you the best in class apparel for modern men.</p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
